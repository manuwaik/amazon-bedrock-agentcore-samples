<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentCore Filesystem Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #f8fafc; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 9999px;
      font-weight: 600; letter-spacing: 0.04em;
      background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44;
    }

    main {
      flex: 1; display: grid;
      grid-template-columns: 1fr 380px;
      min-height: 0;
    }

    /* ---- Chat panel ---- */
    .chat-panel { display: flex; flex-direction: column; border-right: 1px solid #2d3148; }

    .session-bar {
      padding: 10px 16px; background: #13161f;
      border-bottom: 1px solid #2d3148;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      flex-wrap: wrap;
    }
    .session-label { font-size: 11px; color: #64748b; white-space: nowrap; }
    .session-select {
      font-size: 11px; font-family: monospace; color: #7dd3fc;
      background: #1e2131; border: 1px solid #2d3148; border-radius: 4px;
      padding: 4px 8px; min-width: 360px; max-width: 100%;
    }
    .session-select:focus { outline: none; border-color: #3b5bdb; }
    .session-current {
      font-size: 10px; font-family: monospace; color: #475569;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 300px;
    }

    button {
      cursor: pointer; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 500; padding: 5px 12px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-new  { background: #334155; color: #cbd5e1; }
    .btn-stop { background: #3b1a1a; color: #f87171; }
    .btn-send { background: #3b5bdb; color: #fff; padding: 8px 18px; font-size: 13px; }
    .btn-run  { background: #1e3a5f; color: #7dd3fc; white-space: nowrap; }

    .file-list { display: flex; flex-direction: column; gap: 6px; }
    .file-item {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 6px 10px; background: #0a0c10; border: 1px solid #2d3148;
      border-radius: 6px; font-family: monospace; font-size: 12px;
    }
    .file-name { color: #a5f3fc; word-break: break-all; }
    .file-meta { color: #475569; font-size: 11px; white-space: nowrap; margin-left: 8px; }
    .bucket-label { font-size: 10px; color: #475569; font-family: monospace; word-break: break-all; }
    .empty-label { color: #475569; font-size: 12px; font-style: italic; font-family: monospace; }
    .file-item { cursor: pointer; }
    .file-item:hover { border-color: #3b5bdb; background: #0f1320; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: #00000088; z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px;
      width: min(680px, 90vw); max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      padding: 12px 16px; border-bottom: 1px solid #2d3148;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title { font-size: 13px; font-family: monospace; color: #a5f3fc; }
    .modal-close {
      background: none; color: #64748b; font-size: 18px; padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: #e2e8f0; opacity: 1; }
    .modal-body {
      overflow-y: auto; padding: 16px;
      font-family: monospace; font-size: 12px; line-height: 1.6;
      color: #e2e8f0; white-space: pre-wrap; word-break: break-word;
    }

    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .message {
      max-width: 80%; padding: 10px 14px; border-radius: 12px;
      font-size: 14px; line-height: 1.55;
    }
    .message.user {
      background: #1e3a5f; color: #bfdbfe;
      align-self: flex-end; border-bottom-right-radius: 4px;
    }
    .message.assistant {
      background: #1e2131; color: #e2e8f0;
      align-self: flex-start; border-bottom-left-radius: 4px;
      border: 1px solid #2d3148;
    }
    .message.assistant.streaming::after {
      content: "▌"; animation: blink 0.7s steps(1) infinite; color: #7dd3fc;
    }
    .tool-indicator {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #7dd3fc; padding: 4px 10px;
      background: #1a2744; border-radius: 6px; margin: 4px 0;
      font-family: monospace;
    }
    .tool-indicator.done {
      color: #64748b; background: #151a2a;
    }
    .tool-indicator.done .checkmark { color: #22c55e; }
    .tool-indicator .spinner { width: 10px; height: 10px; border-width: 1.5px; }
    .message.error {
      background: #3b1a1a; color: #f87171; align-self: center; font-size: 13px;
    }
    .message.system {
      background: transparent; color: #475569;
      font-size: 12px; align-self: center; font-style: italic;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .message code {
      background: #0f1117; color: #7dd3fc; padding: 1px 5px;
      border-radius: 4px; font-family: monospace; font-size: 13px;
    }
    .message pre {
      background: #0a0c10; border: 1px solid #2d3148; border-radius: 6px;
      padding: 10px 12px; margin: 6px 0; overflow-x: auto;
    }
    .message pre code { background: none; padding: 0; }
    .message ul, .message ol { margin: 4px 0 4px 20px; }
    .message li { margin: 2px 0; }
    .message strong { color: #f1f5f9; }
    .message h1, .message h2, .message h3, .message h4 {
      color: #f1f5f9; margin: 8px 0 4px; line-height: 1.3; font-size: 14px;
    }
    .message hr { border: none; border-top: 1px solid #2d3148; margin: 6px 0; }
    .message table {
      border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%;
    }
    .message th, .message td {
      border: 1px solid #2d3148; padding: 5px 10px; text-align: left;
    }
    .message th { background: #1a1d27; color: #94a3b8; font-weight: 600; }
    .message p { margin: 4px 0; }
    .message blockquote {
      border-left: 3px solid #3b5bdb; padding-left: 12px; margin: 6px 0;
      color: #94a3b8;
    }

    .input-area {
      padding: 12px 16px; border-top: 1px solid #2d3148;
      display: flex; gap: 8px; flex-shrink: 0; background: #13161f;
    }
    textarea {
      flex: 1; background: #1e2131; border: 1px solid #2d3148;
      border-radius: 8px; color: #e2e8f0; font-size: 14px;
      padding: 8px 12px; resize: none; font-family: inherit;
      line-height: 1.4; max-height: 120px;
    }
    textarea:focus { outline: none; border-color: #3b5bdb; }
    textarea::placeholder { color: #475569; }

    /* ---- Sidebar ---- */
    .sidebar { display: flex; flex-direction: column; background: #13161f; min-height: 0; }

    .sidebar-header {
      padding: 12px 16px; border-bottom: 1px solid #2d3148;
      font-size: 12px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

    .cmd-bar { display: flex; gap: 6px; flex-shrink: 0; }
    .cmd-input {
      flex: 1; background: #1e2131; border: 1px solid #2d3148;
      border-radius: 6px; color: #e2e8f0; font-family: monospace;
      font-size: 12px; padding: 6px 10px;
    }
    .cmd-input:focus { outline: none; border-color: #3b5bdb; }

    .cmd-output {
      flex: 1; background: #0a0c10; border: 1px solid #2d3148;
      border-radius: 8px; padding: 12px; overflow: auto;
      font-family: monospace; font-size: 12px; line-height: 1.5;
      color: #a5f3fc; white-space: pre-wrap; word-break: break-all;
    }
    .cmd-output.error-text { color: #f87171; }
    .cmd-output .placeholder { color: #475569; font-style: italic; font-family: inherit; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #2d3148; border-top-color: #7dd3fc;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>AgentCore Runtime (filesystem demo)</h1>
  <span class="badge">Per User &amp; Shared Storage</span>
  <label style="margin-left:auto; font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:6px;">
    User:
    <input id="user-id" type="text" value="demo-user" style="
      background:#1e2131; border:1px solid #2d3148; border-radius:4px;
      color:#7dd3fc; font-size:12px; font-family:monospace;
      padding:4px 8px; width:120px;
    " />
  </label>
</header>

<main>
  <section class="chat-panel">
    <div class="session-bar">
      <span class="session-label">Session:</span>
      <select class="session-select" id="session-select">
        <option value="">-- new session --</option>
      </select>
      <button class="btn-new"  id="btn-new-session">+ New</button>
      <button class="btn-stop" id="btn-stop-session" disabled>Stop</button>
      <span class="session-current" id="session-current"></span>
    </div>
    <div class="messages" id="messages">
      <div class="message system">Send a message to start a new session.</div>
    </div>
    <div class="input-area">
      <textarea id="input" rows="2" placeholder="Type a message..."></textarea>
      <button class="btn-send" id="btn-send">Send</button>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Shared Files</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="spinner" id="cmd-spinner" style="display:none"></div>
        <button class="btn-run" id="btn-run">Refresh</button>
      </div>
    </div>
    <div class="sidebar-content">
      <div id="bucket-label" class="bucket-label"></div>
      <div class="file-list" id="file-list">
        <span class="empty-label">Loading…</span>
      </div>
    </div>
  </aside>
</main>

<div class="modal-overlay" id="file-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  let currentSessionId = null;
  let isStreaming = false;

  const $ = id => document.getElementById(id);
  const messagesEl = $("messages"), inputEl = $("input"),
        sessionSelect = $("session-select"),
        sessionCurrent = $("session-current"),
        btnSend = $("btn-send"), btnNew = $("btn-new-session"),
        btnStop = $("btn-stop-session"),
        btnRun = $("btn-run"),
        fileList = $("file-list"), bucketLabel = $("bucket-label"),
        cmdSpinner = $("cmd-spinner");

  async function refreshSessionList() {
    try {
      const res = await fetch("/sessions");
      const sessions = await res.json();
      const current = sessionSelect.value;
      sessionSelect.innerHTML = '<option value="">-- new session --</option>';
      for (const [id, info] of Object.entries(sessions)) {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = info.label ? `${info.label} (${id})` : id;
        sessionSelect.appendChild(opt);
      }
      if (current) sessionSelect.value = current;
    } catch {}
  }

  function setSession(id) {
    currentSessionId = id;
    btnStop.disabled = !id;
    sessionCurrent.textContent = id || "";
    // Ensure the option exists in the dropdown
    if (id && !sessionSelect.querySelector(`option[value="${id}"]`)) {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = id.slice(0, 8) + "...";
      sessionSelect.appendChild(opt);
    }
    sessionSelect.value = id || "";
    refreshSessionList();
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function setStreaming(on) {
    isStreaming = on;
    btnSend.disabled = on;
    inputEl.disabled = on;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // Markdown → HTML via marked.js
  marked.setOptions({ breaks: false, gfm: true });
  function renderMd(raw) {
    return marked.parse(raw);
  }

  // ---- Chat ----
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;
    inputEl.value = "";
    setStreaming(true);

    addMessage("user", text);
    const div = addMessage("assistant", "");
    div.classList.add("streaming");
    let rawText = "";
    let sseBuffer = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: currentSessionId, user_id: document.getElementById("user-id").value.trim() || "default" }),
      });
      const reader = res.body.getReader();
      const dec = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        sseBuffer += dec.decode(value, { stream: true });
        const lines = sseBuffer.split("\n");
        sseBuffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
          if (ev.type === "session") setSession(ev.session_id);
          else if (ev.type === "text_delta") {
            rawText += ev.text;
            div.innerHTML = renderMd(rawText);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (ev.type === "text") {
            // Fallback for complete AssistantMessage blocks
            if (rawText && !rawText.endsWith("\n")) rawText += "\n\n";
            rawText += ev.text;
            div.innerHTML = renderMd(rawText);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (ev.type === "tool_start") {
            const indicator = document.createElement("div");
            indicator.className = "tool-indicator";
            indicator.id = "tool-active";
            indicator.dataset.tool = ev.name;
            indicator.innerHTML = `<span class="spinner"></span> Using ${escHtml(ev.name)}…`;
            messagesEl.appendChild(indicator);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (ev.type === "tool_done") {
            const active = document.getElementById("tool-active");
            if (active) {
              active.classList.add("done");
              active.removeAttribute("id");
              active.innerHTML = `<span class="checkmark">✓</span> Used ${escHtml(active.dataset.tool)}`;
            }
          } else if (ev.type === "error") {
            div.classList.remove("streaming");
            div.classList.add("error");
            div.textContent = "Error: " + ev.message;
          }
        }
      }
    } catch (err) {
      div.classList.add("error");
      div.textContent = "Network error: " + err.message;
    } finally {
      div.classList.remove("streaming");
      setStreaming(false);
    }
  }

  // ---- Shared S3 files ----
  function formatSize(bytes) {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
  }

  async function loadSharedFiles() {
    cmdSpinner.style.display = "inline-block";
    fileList.innerHTML = "";

    try {
      const res = await fetch("/shared-files");
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      bucketLabel.textContent = `s3://${data.bucket}/shared/`;

      if (data.files.length === 0) {
        fileList.innerHTML = '<span class="empty-label">(no files)</span>';
      } else {
        for (const f of data.files) {
          const item = document.createElement("div");
          item.className = "file-item";
          item.innerHTML = `<span class="file-name">${escHtml(f.name)}</span><span class="file-meta">${formatSize(f.size)}</span>`;
          item.addEventListener("click", () => openFile(f.name));
          fileList.appendChild(item);
        }
      }
    } catch (err) {
      fileList.innerHTML = `<span class="empty-label" style="color:#f87171">${escHtml(err.message)}</span>`;
    } finally {
      cmdSpinner.style.display = "none";
    }
  }

  // ---- Session controls ----
  function clearMessages() {
    messagesEl.innerHTML = "";
  }

  async function loadSessionMessages(sessionId) {
    clearMessages();
    if (!sessionId) return;
    try {
      const res = await fetch(`/sessions/${sessionId}/messages`);
      const messages = await res.json();
      for (const msg of messages) {
        const div = addMessage(msg.role, "");
        div.innerHTML = renderMd(msg.text);
      }
      if (messages.length === 0) {
        addMessage("system", "No messages yet in this session.");
      }
    } catch {
      addMessage("system", "Could not load session history.");
    }
  }

  function newSession() {
    sessionSelect.value = "";
    currentSessionId = null;
    sessionCurrent.textContent = "";
    btnStop.disabled = true;
    cmdOutput.innerHTML = '<span class="placeholder">Output will appear here.</span>';
    clearMessages();
    addMessage("system", "New session — ID will be assigned on first message.");
  }

  async function selectSession() {
    const id = sessionSelect.value;
    if (id) {
      currentSessionId = id;
      sessionCurrent.textContent = id;
      btnStop.disabled = false;
      await loadSessionMessages(id);
    } else {
      newSession();
    }
  }

  async function stopSession() {
    if (!currentSessionId) return;
    const sid = currentSessionId;
    try {
      await fetch(`/sessions/${sid}/stop`, { method: "POST" });
      addMessage("system", `Session ${sid.slice(0,8)}... stopped. Send a message to resume.`);
    } catch (err) {
      addMessage("system", "Error stopping session: " + err.message);
    }
  }

  // ---- Wire up ----
  // ---- File modal ----
  const fileModal = $("file-modal"), modalTitle = $("modal-title"),
        modalBody = $("modal-body"), modalClose = $("modal-close");

  async function openFile(filename) {
    modalTitle.textContent = filename;
    modalBody.textContent = "Loading…";
    fileModal.classList.add("open");
    try {
      const res = await fetch(`/shared-files/${encodeURIComponent(filename)}`);
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      modalBody.textContent = data.content;
    } catch (err) {
      modalBody.textContent = "Error: " + err.message;
    }
  }

  modalClose.addEventListener("click", () => fileModal.classList.remove("open"));
  fileModal.addEventListener("click", e => { if (e.target === fileModal) fileModal.classList.remove("open"); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") fileModal.classList.remove("open"); });

  btnSend.addEventListener("click", sendMessage);
  sessionSelect.addEventListener("change", selectSession);
  btnNew.addEventListener("click", newSession);
  btnStop.addEventListener("click", stopSession);
  btnRun.addEventListener("click", loadSharedFiles);

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Load saved sessions and shared files on startup
  refreshSessionList();
  loadSharedFiles();
</script>
</body>
</html>
